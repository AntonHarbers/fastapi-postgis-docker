services:
  api:
    build: .
    container_name: fastapi_api
    ports: 
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fastapi_demo
    depends_on:
      db:
        condition: service_healthy
  
  db:
    image: postgis/postgis:16-3.4
    container_name: fastapi_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_demo"]
      interval: 10s
      timeout: 30s
      retries: 5

volumes:
  postgres_data: